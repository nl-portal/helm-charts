# Default values for nl-portal-frontend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # -- If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - chart-example.local
  tls: []

startupProbe:
  httpGet:
    path: /
    port: 8081
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 8081
  initialDelaySeconds: 40
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 6
  successThreshold: 1

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

existingSecret: null

# -- Array with extra environment variables to add
# e.g:
# extraEnvVars:
#   - name: FOO
#     value: "bar"

# -- Optionally specify extra list of additional volumes
extraEnvVars: []

# -- Optionally specify extra list of additional volumes
extraVolumes: []

# -- Optionally specify extra list of additional volumeMounts
extraVolumeMounts: []

# -- Application Settings
settings:
  # ---------------------------------------------------------------------------
  # OIDC Authentication (required)
  # ---------------------------------------------------------------------------
  oidc:
    # -- Required: URL to OIDC provider, e.g. Keycloak.
    # -- Note: For Keycloak versions <17, you must append /auth to this URL.
    url:
    # -- Required: OIDC Realm that contains users for NL Portal
    realm:
    # -- Required: OIDC Client ID for the frontend
    clientID:
    # -- URL to redirect to after a successful login.
    # -- If not specified, defaults to ${frontend_url}/keycloak/callback
    redirectUrl:
    # -- URL to redirect to after a successful logout.
    # -- If not specified, defaults to ${frontend_url}
    postLogoutRedirectUrl:
    # -- Enable automatic logout after idle timeout
    autoIdleSessionLogout: true
    # -- Idle timeout in minutes before automatic logout
    idleTimeoutMinutes: 15

  # ---------------------------------------------------------------------------
  # API Endpoints
  # ---------------------------------------------------------------------------
  # -- Backend URL. Empty string = same URL as frontend (inferred from Ingress)
  backendUrl: ""

  # ---------------------------------------------------------------------------
  # Feature Flags
  # ---------------------------------------------------------------------------
  features:
    # -- Whether to fetch theme from backend API
    useThemeApi: false
    # -- OpenKlant API version: "v1" or "v2"
    openKlantVersion: null
    # -- Enable message count polling
    messageCountEnable: true
    # -- Polling interval for message count updates in milliseconds
    messageCountPollingInterval: 10000
    # -- Enable partial/fuzzy search for cases
    casesPartialSearch: true
    # -- Show inhabitant amount on overview page
    showInhabitantAmount: true

  # ---------------------------------------------------------------------------
  # Theme (optional)
  # ---------------------------------------------------------------------------
  # -- CSS theme class name for custom styling (e.g. "gemeente-x")
  themeClass: null

  # ---------------------------------------------------------------------------
  # Overview Page Options
  # ---------------------------------------------------------------------------
  overview:
    # -- Show intro section on overview page
    showIntro: true
    # -- Show maintenance alert banner on overview page
    showMaintenanceAlert: true
    # -- Show preview of current cases on overview page
    showCurrentCasesPreview: true
    # -- Number of cases to display in the current cases preview
    currentCasesPreviewLength: 2

  # ---------------------------------------------------------------------------
  # Account Page Options
  # ---------------------------------------------------------------------------
  account:
    # -- Show notification settings subsection on account page
    showNotificationSubsection: true

  # ---------------------------------------------------------------------------
  # BRP/Address Action URLs (optional)
  # External links shown on account page
  # ---------------------------------------------------------------------------
  brpUrls:
    # -- External link for address research
    addressResearchUrl: null
    # -- External link for more info on address research
    addressResearchMoreInfoUrl: null
    # -- External link for reporting address change
    reportChangeOfAddressUrl: null
    # -- External link for changing use of surname
    changeInUseOfSurnameUrl: null
    # -- External link for changing registered gender
    changeRegisteredGenderUrl: null
    # -- External link for requesting BRP info change
    requestForChangeBrpInfoUrl: null
    # -- External link for requesting data confidentiality
    requestConfidentialityOfDataUrl: null
